# Multi-site Nginx configuration for testing on a single VPS.
#
# Deploy target:
#   /etc/nginx/sites-available/default
#
# Host routing:
#   server.key-ching.com  -> 127.0.0.1:2999
#   server.scramblurr.com -> 127.0.0.1:3000 and /py -> 127.0.0.1:5000
#   server.drauwper.com   -> 127.0.0.1:4000
#   server.iota-chat.com  -> 127.0.0.1:5000

server {
    listen 80;
    listen [::]:80;
    server_name server.key-ching.com server.scramblurr.com server.drauwper.com server.iota-chat.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.key-ching.com;

    ssl_certificate /etc/letsencrypt/live/server.key-ching.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.key-ching.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:2999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.scramblurr.com;

    ssl_certificate /etc/letsencrypt/live/server.scramblurr.com/fullchain.pem;
